services:
  tws:
    #image: registry.upshon.net/tws
    build: .
    container_name: tws
    restart: unless-stopped
    ports:
      - "8888:8888"
    expose:
      - "6081"
    ulimits:
      nofile: 10000
    environment:
      IB_USERNAME: ${IB_ACCOUNT}
      IB_PASSWORD: ${IB_PASSWORD}
      TZ: America/Chicago
    volumes:
      - ./jts/jts.ini:/root/Jts/jts.ini
      - ./jts/tws.xml:/root/tws-config/tws.xml
    tty: true
    stdin_open: true
    networks:
      - tws_internal

  authelia:
    image: authelia/authelia:latest
    container_name: tws-authelia
    restart: unless-stopped
    expose:
      - "9091"
    volumes:
      - ./authelia:/config
      - authelia_data:/data
    environment:
      AUTHELIA_SESSION_SECRET_FILE: /config/secrets/session_secret
      AUTHELIA_STORAGE_ENCRYPTION_KEY_FILE: /config/secrets/storage_encryption_key
      AUTHELIA_IDENTITY_VALIDATION_RESET_PASSWORD_JWT_SECRET_FILE: /config/secrets/jwt_secret
    networks:
      - tws_internal

  nginx:
    image: nginx:alpine
    container_name: tws-nginx
    restart: unless-stopped
    ports:
      - "6080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - tws_internal
    depends_on:
      - tws
      - authelia

networks:
  tws_internal:
    driver: bridge

volumes:
  authelia_data:
