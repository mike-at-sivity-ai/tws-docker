events {}

http {
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # Use real external scheme from TLS-terminating upstream proxy if present
    map $http_x_forwarded_proto $real_proto {
        default $scheme;
        https   https;
    }

    server {
        listen 80;

        # Authelia login portal — not protected by auth_request
        location /authelia/ {
            proxy_pass http://authelia:9091/authelia/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $real_proto;
        }

        # Internal auth check subrequest — nginx calls this, clients cannot
        location = /authelia/api/verify {
            internal;
            proxy_pass http://authelia:9091/authelia/api/verify;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $real_proto;
            proxy_set_header X-Original-URL $real_proto://$http_host$request_uri;
            proxy_set_header X-Forwarded-Method $request_method;
        }

        # Protected app — noVNC with WebSocket
        location / {
            auth_request /authelia/api/verify;
            error_page 401 = @authelia_redirect;
            error_page 403 = @authelia_forbidden;

            auth_request_set $authelia_set_cookie $upstream_http_set_cookie;
            add_header Set-Cookie $authelia_set_cookie;

            proxy_pass http://tws:6081;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $real_proto;
            proxy_read_timeout 3600s;
        }

        location @authelia_redirect {
            return 302 $real_proto://$http_host/authelia/?rd=$real_proto://$http_host$request_uri;
        }

        location @authelia_forbidden {
            return 403 "Forbidden";
        }
    }
}
