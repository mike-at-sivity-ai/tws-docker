variables:
  IMAGE_NAME: registry.upshon.net/tws
  IMAGE_TAG: latest


stages:          
  - build
  - deploy
  - cleanup

build-job:       
  stage: build
  before_script:
    - docker login -u $REGISTRY_USER -p $REGISTRY_PASS registry.upshon.net
  script:
    - docker build -t $IMAGE_NAME:$IMAGE_TAG .
    - docker push $IMAGE_NAME:$IMAGE_TAG
    
deploy:      
  stage: deploy
  before_script:
    - chmod 400 $SSH_KEY
  script:
    - ssh -o StrictHostKeyChecking=no -i $SSH_KEY mike@docker-live "
        curl -X POST $WEB_HOOK
      "
cleanup:      
  stage: cleanup
  script:
    - docker image prune --force
